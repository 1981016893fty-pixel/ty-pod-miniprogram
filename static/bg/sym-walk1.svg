<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Keith Haring walking figure - red -->
  <circle cx="50" cy="15" r="12" fill="#ff2b50" stroke="#000" stroke-width="4"/>
  <!-- torso leaning forward -->
  <path d="M40 28 Q50 25 60 28 L58 55 Q50 58 42 55 Z" fill="#ff2b50" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
  <!-- back arm swinging back -->
  <path d="M42 30 L25 45 L22 52" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M22 52 L20 55 L24 55 Z" fill="#ff2b50" stroke="#000" stroke-width="3"/>
  <!-- front arm reaching forward -->
  <path d="M58 30 L75 40 L80 38" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M80 38 L83 35 L84 40 Z" fill="#ff2b50" stroke="#000" stroke-width="3"/>
  <!-- front leg (stride forward) -->
  <path d="M48 55 L62 80 L68 95" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M68 95 L72 98 L65 98 Z" fill="#ff2b50" stroke="#000" stroke-width="3"/>
  <!-- back leg (pushing off) -->
  <path d="M52 55 L38 78 L30 92" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M30 92 L26 95 L33 95 Z" fill="#ff2b50" stroke="#000" stroke-width="3"/>
  <!-- motion lines -->
  <path d="M10 50 L20 50 M8 58 L18 58 M12 42 L22 42" stroke="#000" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
